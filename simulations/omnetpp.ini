# =============================================================================
# omnetpp.ini — Simulación LoRa Multihop en Túnel de Mina
# Red: Wireless3 | FLORA 1.1.0 + INET 4.4.0 + OMNeT++ 6.0.3
# Arquitectura: Estrella extendida con multihop (hasta 7 saltos)
# =============================================================================

[General]
network = wireless3.simulations.Wireless3

# Tiempo de simulación. 60s es suficiente para obtener estadísticas estables
sim-time-limit = 600s

# Resolución temporal de 10^-11 s — necesaria para capturar el airtime
# de tramas LoRa (SF12 puede durar hasta 2.8s).
simtime-resolution = -11

# =============================================================================
# ARCHIVOS EXTERNOS (generados automáticamente por Python)
# - coordenadas.ini : posición de cada nodo en el mapa de la mina
# - conexion.ini    : destNodeIds, nextHopId y parámetros LoRa por nodo
# - frecuencia.ini : frecuencia de banda
# =============================================================================
include coordenadas.ini
include conexion.ini
include frecuencia.ini

# =============================================================================
# TOPOLOGÍA Y MOVILIDAD
# Todos los nodos son estacionarios. Las coordenadas vienen de coordenadas.ini.
# =============================================================================
*.host[*].mobility.typename = "StationaryMobility"
*.host[*].mobility.initFromDisplayString = false

# Parámetros de despliegue — usados solo si deploymentType = "circle".
# En esta simulación se ignoran porque las coordenadas son fijas del Excel.
*.host[*].gatewayX = 250
*.host[*].gatewayY = 150
*.host[*].maxGatewayDistance = 2000

# Número de paquetes por nodo. 0 = ilimitado (la simulación para por tiempo).
*.host[*].app[0].numberOfPacketsToSend = 0


# =============================================================================
# MEDIO DE RADIO (LoRaMedium)
# Se comparan dos modelos de propagación para el entorno de túnel de mina:
#   - TrueRays  : método de rayos imagen (más pesimista, más detallado)
#   - Multimodel: método de modos de guía de onda (más optimista)
# OMNeT++ ejecuta ambos en runs separados automáticamente.
# =============================================================================
*.radioMedium.typename = "LoRaMedium"

# Iteración entre modelos de path loss (genera Run #0 y Run #1)
*.radioMedium.pathLoss.typename = ${pathlosstype="TrueRays","Multimodel"}

# Límites de duración de transmisión — evita que OMNeT++ aborte simulaciones
# con SF altos cuyo airtime supera el umbral de detección de bucles infinitos.
*.radioMedium.maxTransmissionDuration = 100s
*.radioMedium.mediumLimitCache.maxTransmissionDuration = 100s

# --- Ruido de fondo ---
# Piso térmico para LoRa EU868:
#   N = kTB·NF = -174 dBm/Hz + 10·log10(125000 Hz) + 6 dB(NF) = -117 dBm
# Sin este parámetro el SNIR es infinito.
*.radioMedium.backgroundNoise.typename = "IsotropicScalarBackgroundNoise"
*.radioMedium.backgroundNoise.power = -117dBm

# --- Parámetros del túnel (sección rectangular 4m × 4m) ---
*.radioMedium.pathLoss.width_tunnel  = 4      # ancho del túnel (m)
*.radioMedium.pathLoss.height_tunnel = 4      # alto del túnel (m)

# Ganancias de antena (dBi → lineal)
# gain_tx    = 2 dBi → 1.5849 lineal  (antena omnidireccional TX, ambos modelos)
# gain_tx_tr = -7 dBi → 0.2 lineal    (antena receptora, modelo TrueRays)
*.radioMedium.pathLoss.gain_tx    = 1.5849
*.radioMedium.pathLoss.gain_tx_tr = 0.2

# Potencia interna del modelo de propagación (W) — usada en cálculos de campo.
# Distinta de la potencia real del radio LoRa (14 dBm = 0.02512 W).
*.radioMedium.pathLoss.power_tx = 2.5

# Potencia real del radio LoRa — usada para calcular el RSSI registrado.
# 14 dBm = 0.025119 W. Debe coincidir con initialLoRaTP en conexion.ini.
*.radioMedium.pathLoss.p_tx_radio = 0.025119W



# =============================================================================
# CONFIGURACIÓN DE NODOS (NIC, COLA Y RECEPTOR)
# =============================================================================

# Cola sin límite de capacidad — evita descartes por overflow en nodos relay
# que reciben y retransmiten paquetes de nodos vecinos.
*.host[*].LoRaNic.queue.typename = "DropTailQueue"
*.host[*].LoRaNic.queue.packetCapacity = -1

# Receptor LoRa: sensibilidad y umbral de detección de energía.
# Ambos en -117 dBm (coincide con el piso de ruido calculado).
# LoRaReceiver usa modelo de umbral binario — paquete recibido si RSSI > sensitivity.
*.host[*].LoRaNic.radio.receiver.typename          = "LoRaReceiver"
*.host[*].LoRaNic.radio.receiver.energyDetection   = -117dBm
*.host[*].LoRaNic.radio.receiver.sensitivity       = -117dBm


# =============================================================================
# GATEWAY
# Recibe tramas LoRa del canal de radio y las reenvía al NetworkServer
# mediante UDP sobre Ethernet simulada.
# =============================================================================
*.gateway.numUdpApps = 1
*.gateway.packetForwarder.destAddresses = "networkServer"
*.gateway.packetForwarder.localPort     = 2000
*.gateway.packetForwarder.destPort      = 1000
*.gateway.packetForwarder.indexNumber   = 0


# =============================================================================
# NETWORK SERVER
# Recibe paquetes del gateway, registra métricas por nodo (DER, numReceived)
# y opcionalmente envía comandos ADR de vuelta a los nodos.
# =============================================================================
*.networkServer.numApps = 1
*.networkServer.app[0].typename        = "NetworkServerApp"
*.networkServer.app[0].destAddresses   = "gateway"
*.networkServer.app[0].destPort        = 2000
*.networkServer.app[0].localPort       = 1000
*.networkServer.app[0].adrMethod       = "avg"


# =============================================================================
# ENERGÍA
# Se desactiva el módulo de energía para simplificar la simulación.
# El consumo energético no es objeto de estudio en este trabajo.
# =============================================================================
**.energySourceModule    = ""
**.energyStorageModule   = ""
**.energyConsumerModule  = ""


# =============================================================================
# VISUALIZACIÓN (Qt/Tkenv)
# =============================================================================

# Muestra la propagación de señales en el canvas — útil para verificar
# que los nodos están transmitiendo y el medio funciona.
*.visualizer.mediumVisualizer.displaySignals = true

# Iconos por tipo de nodo
**.host[*].displayString      = "i=misc/sensor"
**.gateway.displayString      = "i=misc/antennatower"
**.networkServer.displayString = "i=misc/server"

# Visualización de enlaces activos entre nodos — confirma visualmente
# que el multihop está ocurriendo (enlaces nodo-nodo visibles en pantalla).
*.visualizer.physicalLinkVisualizer.displayLinks  = true
*.visualizer.physicalLinkVisualizer.packetFilter  = "DataFrame*"
*.visualizer.dataLinkVisualizer.displayLinks      = true


# =============================================================================
# GRABACIÓN DE MÉTRICAS (para análisis en Python via scavetool)
# Se habilitan los vectores necesarios para extraer RSSI, SNIR.
# Los escalares se graban por defecto sin configuración adicional.
# =============================================================================

# Vectores del medio de radio (incluye Reception power por par TX-RX)
*.radioMedium.*.result-recording-modes = default,+vector

# Vectores del radio de cada nodo (minSnir, bitErrorRate, packetErrorRate)
*.host[*].LoRaNic.radio.*.result-recording-modes = default,+vector

# Forzar grabación específica de SNIR como vectores temporales
**.snir:vector.result-recording-modes           = +vector
